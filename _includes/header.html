<header class="site-header">
  <div class="header-inner">
    <a href="{{ "/" | relative_url }}" class="site-title">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ "/" | relative_url }}"
         {% if page.url == "/" %}class="active"{% endif %}>Home</a>
      <a href="{{ "/projects/" | relative_url }}"
         {% if page.url contains "/projects" %}class="active"{% endif %}>Projects</a>
      <a href="{{ "/about/" | relative_url }}"
         {% if page.url == "/about/" %}class="active"{% endif %}>About</a>
      <a href="{{ "/contact/" | relative_url }}"
         {% if page.url == "/contact/" %}class="active"{% endif %}>Contact</a>
    </nav>
  </div>
</header>
