<div class="project-card">

  {% if project.image %}
  <a href="{{ project.url | relative_url }}" class="card-preview-link">
    <div class="card-preview">
      <img
        src="{{ project.image | relative_url }}"
        alt="{{ project.title }} dashboard preview"
        loading="lazy"
      />
      <div class="card-preview-overlay">
        <span class="overlay-btn">View Project →</span>
      </div>
    </div>
  </a>
  {% endif %}

  <div class="card-body">
    <div class="card-header">
      <h3><a href="{{ project.url | relative_url }}">{{ project.title }}</a></h3>
      {% if project.status %}
        <span class="badge badge-{{ project.status }}">{{ project.status }}</span>
      {% endif %}
    </div>

    {% if project.summary %}
      <p class="card-summary">{{ project.summary }}</p>
    {% endif %}

    <div class="card-footer">
      <span class="tech-stack">{{ project.tech }}</span>
      <div class="card-links">
        <a href="{{ project.url | relative_url }}" class="card-link">Read More →</a>
        {% if project.github %}
          <a href="{{ project.github }}" class="card-link card-link-github" target="_blank">GitHub →</a>
        {% endif %}
      </div>
    </div>
  </div>

</div>
