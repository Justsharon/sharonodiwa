title: Sharon Odiwa
description: Data Analyst — Python · SQL · MySQL · Power BI
url: "https://justsharon.github.io"
baseurl: "/sharonodiwa"

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project

permalink: /:title/

markdown: kramdown

kramdown:
  input: GFM
  hard_wrap: false
  parse_block_html: true

plugins:
  - jekyll-relative-links

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor